<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard แผนปฏิบัติราชการ เชียงใหม่ 2568</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📊 Dashboard ติดตามแผนปฏิบัติราชการประจำปี 2568 จังหวัดเชียงใหม่</h1>
            <p class="text-gray-500 mt-2">ดึงข้อมูลสถานะแบบ Real-time จากระบบฐานข้อมูล</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">📍 Heat map ความเข้มข้นของ KPI ตามอำเภอ</h2>
                <div id="heatmap" style="width: 100%; height: 400px;"></div>
                <p class="text-xs text-gray-400 mt-2">* ขนาดและโทนสีแดงแสดงถึงระดับของ KPI</p>
            </div>

            <div class="card">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">📈 สรุป KPI รายอำเภอ</h2>
                <div id="barchart" style="width: 100%; height: 400px;"></div>
            </div>
        </div>
    </div>

    <script>
        //'https://script.google.com/macros/s/AKfycbz_SWNf7FUDbdqDeFbj_sd-8yOUxQewleyHry9ClgZJn8G6a7dCyil-kyOqDKcWBclqgA/exec'
        const API_URL = 'https://script.google.com/macros/s/AKfycbz_SWNf7FUDbdqDeFbj_sd-8yOUxQewleyHry9ClgZJn8G6a7dCyil-kyOqDKcWBclqgA/exec';

        async function fetchData() {
            try {
                // คำสั่งดึงข้อมูลทะลุกำแพงของ Google
                const response = await fetch(API_URL, { redirect: "follow" });
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if(data.error) {
                    alert("พบปัญหาจาก Google Sheet: " + data.error);
                    return;
                }
                
                renderCharts(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบว่าใส่ URL ถูกต้องหรือไม่');
            }
        }

        function renderCharts(data) {
            // จับคู่ข้อมูลให้เข้ากับคอลัมน์ใน Excel ของคุณ (อำเภอ และ KPI)
            const treeMapData = data.map(item => ({
                name: item['อำเภอ'],
                value: item['KPI'] || 0
            }));

            const sortedData = [...data].sort((a, b) => (b['KPI'] || 0) - (a['KPI'] || 0));
            const districts = sortedData.map(item => item['อำเภอ']);
            const kpis = sortedData.map(item => item['KPI'] || 0);

            // วาด Heatmap (Treemap)
            const heatmapChart = echarts.init(document.getElementById('heatmap'));
            heatmapChart.setOption({
                tooltip: { formatter: '{b}: KPI = {c}' },
                series: [{
                    type: 'treemap',
                    data: treeMapData,
                    roam: false,
                    label: { show: true, formatter: '{b}\n\n{c}' },
                    levels: [{
                        itemStyle: { borderWidth: 2, borderColor: '#fff' },
                        colorMappingBy: 'value',
                        color: ['#fecaca', '#f87171', '#ef4444', '#b91c1c']
                    }]
                }]
            });

            // วาดกราฟแท่ง
            const barChart = echarts.init(document.getElementById('barchart'));
            barChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: districts.reverse() },
                series: [{
                    name: 'KPI',
                    type: 'bar',
                    data: kpis.reverse(),
                    itemStyle: { color: '#3b82f6' }
                }]
            });

            window.addEventListener('resize', () => {
                heatmapChart.resize();
                barChart.resize();
            });
        }

        // เริ่มดึงข้อมูลทันทีเมื่อเปิดเว็บ
        if(API_URL !== 'เอา_URL_มาวางตรงนี้'){
            fetchData();
        } else {
            alert("โปรดนำ URL จาก Apps Script มาใส่ในไฟล์ index.html ก่อนครับ");
        }
    </script>
</body>
</html>
